
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saurashtra Residency - World Class Living</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#ecfdf5',
              100: '#d1fae5',
              200: '#a7f3d0',
              300: '#6ee7b7',
              400: '#34d399',
              500: '#10b981',
              600: '#059669', // Sophisticated Emerald
              700: '#047857',
              800: '#065f46',
              900: '#064e3b',
            },
            accent: {
              gold: '#f59e0b',
              champagne: '#fef3c7',
            }
          },
          animation: {
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'float': 'float 6s ease-in-out infinite',
            'glow': 'glow 3s ease-in-out infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' },
            },
            glow: {
              '0%, 100%': { 'box-shadow': '0 0 15px rgba(16, 185, 129, 0.2)' },
              '50%': { 'box-shadow': '0 0 30px rgba(16, 185, 129, 0.5)' },
            }
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand-emerald: #059669;
    }
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      -webkit-font-smoothing: antialiased;
      transition: background-color 0.5s ease;
      cursor: default;
    }
    
    /* Smooth Scroll */
    html { scroll-behavior: smooth; }

    /* Custom Scrollbar */
    .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { 
      background: #10b98144; 
      border-radius: 10px;
    }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #10b98122; }

    /* Modern UI Glass */
    .glass {
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      background: rgba(255, 255, 255, 0.7);
    }
    .dark .glass {
      background: rgba(2, 6, 23, 0.7);
    }

    .glass-border {
      border: 1px solid rgba(16, 185, 129, 0.1);
    }
    .dark .glass-border {
      border: 1px solid rgba(16, 185, 129, 0.05);
    }

    /* Premium Transitions */
    .page-transition {
      animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Active Nav Glow */
    .nav-active-glow {
      box-shadow: 0 0 25px rgba(16, 185, 129, 0.3);
    }

    /* Bento Grid Effects */
    .bento-card {
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      border: 1px solid transparent;
    }
    .bento-card:hover {
      transform: translateY(-6px);
      border-color: rgba(16, 185, 129, 0.15);
      box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05);
    }
    .dark .bento-card:hover {
      box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.4);
    }

    .premium-card {
      background: linear-gradient(135deg, #ffffff 0%, #f9fafb 100%);
    }
    .dark .premium-card {
      background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
    }

    /* Mesh Background for Dark Mode */
    .dark body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 0% 0%, rgba(16, 185, 129, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }

    /* Premium Shadow */
    .premium-shadow {
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.04);
    }
    .dark .premium-shadow {
      box-shadow: 0 20px 50px -15px rgba(0, 0, 0, 0.5);
    }

    /* Animated Border */
    @keyframes borderRotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    .glow-border {
      position: relative;
      overflow: hidden;
    }
    .glow-border::after {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 0deg, transparent, rgba(16, 185, 129, 0.2), transparent);
      animation: borderRotate 4s linear infinite;
      pointer-events: none;
    }
  </style>
</head>
<body class="bg-[#fcfdfe] text-slate-900 dark:bg-[#020617] dark:text-slate-100 selection:bg-brand-100 selection:text-brand-900">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
